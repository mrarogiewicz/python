name: Keep Render App Alive

on:
  schedule:
    - cron: "*/10 * * * *"  # každých 10 minút
  workflow_dispatch:          # možnosť spustiť manuálne

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        run: |
          curl -f ${{ secrets.RENDER_URL }}/ping || echo "Ping failed"
