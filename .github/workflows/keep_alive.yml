name: Keep Render App Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        run: |
          curl -f ${{ secrets.RENDER_URL }}/keepalive || echo "Ping failed"
